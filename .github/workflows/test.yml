name: Test

on:
  pull_request:
  push:
    branches: [ main, beta, feature/* ]

jobs:
  test-deploy:
    name: Test able to deploy to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run build

      - name: Publish test
        run: npm publish --dry-run

  test-plugin-android:
    name: Test unit tests for plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run plugin tests
        run: npm run setup-test-app && npm test -- __tests__/android

  test-plugin-ios:
    name: Test unit tests for plugin
    runs-on: ubuntu-latest
    strategy:
      matrix:
        push_provider: [fcm, apn]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
      
      - name: Setup local.env file for sample app
        shell: bash
        run: |
          touch "test-app/local.env"
          echo "pushProvider=${{ matrix.push_provider }}" >> "test-app/local.env"

      - name: Run plugin tests
        run: npm run setup-test-app && npm test -- __tests__/ios/common __tests__/ios/${{ matrix.push_provider }}

  test-utils:
    name: Test utility functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run utils tests
        run: npm test -- __tests__/utils

  test-pnpm-dev-apps:
    name: Build pnpm dev apps and verify Podfile + expoVersion
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install root dependencies
        run: npm ci

      - name: Set up test-app-pnpm (flat)
        run: npm run setup-test-app-pnpm

      - name: Set up test-app-pnpm-monorepo (workspace)
        run: npm run setup-test-app-pnpm-monorepo

      - name: Verify Podfile :path values and expoVersion attribution
        run: npm run verify-pnpm-dev-apps
